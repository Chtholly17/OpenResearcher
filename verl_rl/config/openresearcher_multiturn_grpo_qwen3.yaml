hydra:
  searchpath:
    - pkg://verl.trainer.config

defaults:
  - ppo_trainer
  - _self_

# ---- Data ----
data:
  # Path to parquet files generated by:
  #   python verl_rl/preprocess_openresearcher.py ... --model_type qwen3
  # (Must be regenerated from Nemotron data — Qwen3 uses different system prompt)
  train_files: ~/data/openresearcher_qwen3/train.parquet
  val_files: ~/data/openresearcher_qwen3/test.parquet
  max_prompt_length: 4096
  max_response_length: 6144
  train_batch_size: 64
  return_raw_chat: True

# ---- Reward ----
custom_reward_function:
  path: verl_rl/reward/openresearcher_reward.py
  name: compute_score

# ---- Actor / Rollout / Reference ----
actor_rollout_ref:
  hybrid_engine: True
  model:
    path: Qwen/Qwen3-8B
    # trust_remote_code not required for Qwen3 (it's a standard HF model)
    trust_remote_code: False
    enable_gradient_checkpointing: True
  actor:
    optim:
      lr: 1e-6
      weight_decay: 0.01
    ppo_mini_batch_size: 16
    ppo_micro_batch_size_per_gpu: 2
    ppo_epochs: 1
    clip_ratio: 0.2
    entropy_coeff: 0.01
  ref:
    log_prob_micro_batch_size_per_gpu: 2
  rollout:
    name: vllm
    temperature: 1.0
    top_p: 0.95
    multi_turn:
      enable: True
      max_assistant_turns: 15
      max_user_turns: 15
      max_parallel_calls: 1
      max_tool_response_length: 2048
      tool_response_truncate_side: middle
      # Qwen3 uses standard JSON tool calling (OpenAI-compatible / hermes format):
      #   <tool_call>{"name": "func", "arguments": {"key": "val"}}</tool_call>
      # The built-in hermes parser handles this correctly.
      format: hermes
      tool_config_path: ./config/tool_config/openresearcher_tool_config.yaml
      interaction_config_path: ./config/interaction_config/openresearcher_interaction_config.yaml
    server:
      timeout: 120
      max_attempts: 3
      retry_delay: 5
      max_connections: 500
      max_start_wait_time: 600.0

# ---- Algorithm ----
algorithm:
  adv_estimator: grpo
  grpo_n_generations: 4
  norm_adv_by_std_in_grpo: True
  gamma: 1.0
  lam: 1.0
  use_kl_in_reward: False
  kl_ctrl:
    type: fixed
    kl_coef: 0.001

# ---- Trainer ----
trainer:
  total_epochs: 5
  total_training_steps: null
  project_name: openresearcher_rl
  experiment_name: grpo_qwen3
  logger: ["console", "wandb"]
  nnodes: 1
  n_gpus_per_node: 8
  save_freq: 50
  test_freq: 25
  val_before_train: True
  default_local_dir: checkpoints/${trainer.project_name}/${trainer.experiment_name}
